name: "CI"

on:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: "read"
  pull-requests: "write"

jobs:
  lint:
    name: "Lint"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
      pull-requests: "write"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"

      - name: "Setup Node"
        uses: "actions/setup-node@v4"
        with:
          node-version: "20.19.0"
          cache: "npm"

      - name: "Install"
        run: "npm ci"

      - name: "ESLint (reviewdog comments)"
        uses: "reviewdog/action-eslint@v1"
        with:
          github_token: "${{ secrets.GITHUB_TOKEN }}"
          reporter: "github-pr-review"
          level: "error"
          fail_on_error: "true"
          filter_mode: "diff_context"
          eslint_flags: "src --ext .ts"

  tests:
    name: "Tests"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"

      - name: "Setup Node"
        uses: "actions/setup-node@v4"
        with:
          node-version: "20.19.0"
          cache: "npm"

      - name: "Install"
        run: "npm ci"

      - name: "Unit tests (coverage)"
        run: "npm test"
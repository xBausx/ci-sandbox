reviews:
  # Generate title if PR title contains this placeholder:
  auto_title_placeholder: "@coderabbitai title"

  # Replace this placeholder in the PR description:
  high_level_summary_placeholder: "@coderabbitai summary"

  # (Optional) keep summary on by default
  high_level_summary: true

  # makes CodeRabbit “request changes” and then auto-approve once its threads are resolved.
  request_changes_workflow: true

  # If you want it to run automatically on PR open/update
  auto_review:
    enabled: true
    drafts: false